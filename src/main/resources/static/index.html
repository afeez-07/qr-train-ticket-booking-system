<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Train Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🚆 QR Train Booking System</h1>

    <!-- REGISTER -->
    <div id="registerPage" class="card">
        <h2>Register</h2>
        <input type="text" id="regUsername" placeholder="Username">
        <input type="password" id="regPassword" placeholder="Password">
        <button type="button" onclick="register()">Register</button>
        <p id="registerMsg" class="msg"></p>
        <p class="link" onclick="showLogin()">Already registered? Login</p>
    </div>

    <!-- LOGIN -->
    <div id="loginPage" class="card hidden">
        <h2>Login</h2>
        <input type="text" id="loginUsername" placeholder="Username">
        <input type="password" id="loginPassword" placeholder="Password">
        <button type="button" onclick="login()">Login</button>
        <p id="loginMsg" class="msg"></p>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="card hidden">
        <h2>Dashboard</h2>

        <div class="nav-buttons">
            <button onclick="showTrainSearch()">Train Search</button>
            <button onclick="showBooking()">Book Ticket</button>
            <button onclick="logout()">Logout</button>
            <button onclick="showAdmin()">Admin Panel</button>
        </div>

        <hr>

        <!-- TRAIN SEARCH -->
        <div id="trainSearch" class="hidden">
            <h3>Search Trains</h3>
            <input type="text" id="source" placeholder="Source">
            <input type="text" id="destination" placeholder="Destination">
            <button onclick="searchTrains()">Search</button>

            <div id="trainResults"></div>
        </div>

        <!-- BOOKING -->
        <div id="booking" class="hidden">

            <input id="trainId" placeholder="Train ID">
            <input id="seats" placeholder="Seats">

            <button onclick="bookTicket()">Book Ticket</button>

            <p id="bookingMsg"></p>
            <img id="qrImage" width="200">

            <button id="downloadBtn" onclick="downloadPDF()" style="display:none;">
                Download Ticket PDF
            </button>

            <br><br>
            <hr>

            <h4>Cancel Ticket</h4>
            <input id="cancelTicketId" placeholder="Enter Ticket ID">
            <button onclick="cancelTicket()">Cancel Ticket</button>
            <p id="cancelMsg"></p>


        </div>

        <!-- ADMIN LOGIN POPUP -->
        <div id="adminLoginBox" class="hidden">
            <h3>Admin Login</h3>
            <input id="adminUser" placeholder="Admin Username">
            <input id="adminPass" type="password" placeholder="Admin Password">
            <button onclick="checkAdmin()">Login</button>
            <p id="adminLoginMsg"></p>
        </div>

        <div id="adminPanel" class="hidden">

            <h3>Admin Panel</h3>

            <button onclick="loadAllTrains()">View Trains</button>
            <button onclick="loadAllTickets()">View Tickets</button>

            <h4>Add Train</h4>

            <input id="adminTrainName" placeholder="Train Name">
            <input id="adminSource" placeholder="Source">
            <input id="adminDestination" placeholder="Destination">
            <input id="adminFare" placeholder="Fare">
            <input id="adminSeats" placeholder="Seats">

            <button onclick="addTrain()">Add Train</button>

            <div id="adminData"></div>

        </div>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
